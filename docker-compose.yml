services:
  chat-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat-service
    ports:
      - "8080:8080"
    volumes:
      - ./config/config.yaml:/app/config/config.yaml
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      centrifugo:
        condition: service_started
      scylladb:
        condition: service_healthy
      infra-init:
        condition: service_completed_successfully
    networks:
      - chat_network
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: chat_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chat_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d chat_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  scylladb:
    image: scylladb/scylla:2026.1.1
    command: --smp 1 --memory 1G --overprovisioned 1 --api-address 0.0.0.0
    ports:
      - "9042:9042"
    volumes:
      - scylla_data:/var/lib/scylla
    networks:
      - chat_network
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster'"]
      interval: 10s
      timeout: 5s
      retries: 10

  infra-init:
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      - chat_network
    depends_on:
      postgres:
        condition: service_healthy
      scylladb:
        condition: service_healthy
    volumes:
      - ./migrations:/app/migrations
      - ./config/config.yaml:/app/config/config.yaml
    entrypoint: ["/app/infra-init"]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - chat_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  centrifugo:
    image: centrifugo/centrifugo:v5.4.1
    command: centrifugo -c config.json
    ports:
      - "8000:8000"
    volumes:
      - ./centrifugo_config.json:/centrifugo/config.json
    environment:
      - CENTRIFUGO_REDIS_ADDRESS=redis:6379
      - CENTRIFUGO_ENGINE=redis
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - chat_network

networks:
  chat_network:
    driver: bridge

volumes:
  postgres_data:
  scylla_data:
  redis_data:
